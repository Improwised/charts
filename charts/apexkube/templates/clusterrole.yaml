kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  labels:
    {{- include "apexkube.labels" . | nindent 4 }}
  name: {{ include "apexkube.fullname" . }}
rules:
  - apiGroups:
      - ""
    resources:
      - users
      - groups
      - serviceaccounts
    verbs:
      - impersonate

  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
      - list
      - watch
      - update

  - apiGroups:
      - authentication.k8s.io
    resources:
      - userextras/scopes
      - userextras/remote-client-ip
    verbs:
      - impersonate

  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
      - get
      - list
      - watch
      - update

  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - organization.platformengineers.io
    resources:
      - users
      - accounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - delete

  # projectsveltos access
  - apiGroups:
      - lib.projectsveltos.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - lib.projectsveltos.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
      - create
      - delete

  # rbac.platformengineers access
  - apiGroups:
      - rbac.platformengineers.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - rbac.platformengineers.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - update

  # namespace management
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # read access for identities
  - apiGroups:
      - ""
    resources:
      - users
      - groups
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
