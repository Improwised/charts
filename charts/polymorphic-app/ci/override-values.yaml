serviceTemplate:
  healthcheck:
    enabled: true
    type: httpGet
    port: 80
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5
services:
  - name: demo-1
    image:
      repository: nginx
      tag: "latest"
    ports:
      - name: http
        containerPort: 80
    service:
      ports:
        - name: http
          port: 80
          targetPort: http
  - name: demo-2
    type: StatefulSet
    image:
      repository: nginx
      tag: latest
    healthcheck:
      enabled: true
      type: tcpSocket
      port: 80
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 3
    volumeMounts:
      - name: data
        mountPath: /data
    volumeClaimTemplates:
      - metadata:
          name: data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  - name: demo-3
    image:
      repository: nginx
      tag: latest
    healthcheck:
      enabled: true
      type: exec
      command:
        - cat
        - /usr/share/nginx/html/index.html
  - name: demo-4
    image:
      repository: nginx
      tag: "latest"
    ports:
      - name: http
        containerPort: 80
    healthcheck:
      enabled: true
      type: exec
      liveness:
        command:
          - cat
          - /usr/share/nginx/html/index.html
        initialDelaySeconds: 5
        periodSeconds: 5
      readiness:
        command:
          - cat
          - /usr/share/nginx/html/50x.html

  - name: demo-5
    image:
      repository: nginx
      tag: "latest"
    ports:
      - name: http
        containerPort: 80
    healthcheck:
      enabled: true
      type: httpGet
      path: /
      port: 80
      liveness:
        port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 5
        timeoutSeconds: 5
        path: /live
      readiness:
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 10
        timeoutSeconds: 10
  - name: demo-6
    image:
      repository: nginx
      tag: "latest"
    healthcheck:
      enabled: false
      type: httpGet
      path: /
      port: 80
  - name: demo-7
    image:
      repository: nginx
      tag: "latest"
    healthcheck:
      enabled: true
      type: httpGet
      liveness:
        path: /live
        port: 80
